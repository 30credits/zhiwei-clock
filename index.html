<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>知味打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: 90%;
      max-width: 400px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      background: white;
      text-align: center;
    }

    .profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #4caf50;
    }

    .btn-clock {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      color: white;
    }

    .btn-on {
      background-color: #198754;
    }

    .btn-off {
      background-color: #dc3545;
    }

    #loading {
      font-size: 16px;
      color: #6c757d;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">系統啟動中，請稍候...LINE測試V3</div>

    <div id="main-content" style="display: none;">
      <img id="user-picture" class="profile-img" src="" alt="頭像">
      <h3>哈囉，<span id="user-name">員工</span></h3>
      <p>歡迎使用知味行動打卡系統</p>

      <button class="btn-clock btn-on" onclick="handleClock('上班')">上班打卡</button>
      <button class="btn-clock btn-off" onclick="handleClock('下班')">下班打卡</button>
    </div>
  </div>

  <script>
    const liffId = "2010509536-AYeAZGh2";
    const gasUrl = "https://script.google.com/macros/s/AKfycbyYpWpgCNsoX490cCUpEryu8Jb8ShDg_frwZOwcDDh1RboTU-PsVpoTq8BSQxIfi2OuNA/exec";

    let userName = "";
    let userId = "";

    async function initLiff() {
      try {
        setLoading("正在初始化 LINE...");

        await liff.init({
          liffId: liffId
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        setLoading("正在讀取員工資料...");

        const profile = await liff.getProfile();

        userName = profile.displayName;
        userId = profile.userId;

        document.getElementById("user-name").innerText = userName;
        document.getElementById("user-picture").src = profile.pictureUrl || "";

        document.getElementById("loading").style.display = "none";
        document.getElementById("main-content").style.display = "block";

      } catch (error) {
        setLoading("LIFF 初始化失敗：\n" + error.message);
      }
    }

    function handleClock(type) {
      document.getElementById("main-content").style.display = "none";
      document.getElementById("loading").style.display = "block";
      setLoading("正在取得 GPS 定位...");

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setLoading("正在送出打卡資料...");

          submitToAppsScript({
            name: userName,
            userId: userId,
            type: type,
            lat: lat,
            lng: lng
          });

          alert(type + "打卡資料已送出，請到試算表確認紀錄。");

          if (liff.isInClient()) {
            liff.closeWindow();
          }
        },
        function(error) {
          alert("無法取得定位：" + error.message);
          resetUI();
        },
        {
          enableHighAccuracy: true,
          timeout: 10000
        }
      );
    }

    function submitToAppsScript(data) {
      const iframeName = "hidden-submit-frame";

      let iframe = document.getElementById(iframeName);
      if (!iframe) {
        iframe = document.createElement("iframe");
        iframe.name = iframeName;
        iframe.id = iframeName;
        iframe.style.display = "none";
        document.body.appendChild(iframe);
      }

      const form = document.createElement("form");
      form.method = "POST";
      form.action = gasUrl;
      form.target = iframeName;
      form.style.display = "none";

      const input = document.createElement("input");
      input.name = "payload";
      input.value = JSON.stringify(data);

      form.appendChild(input);
      document.body.appendChild(form);

      form.submit();

      setTimeout(function() {
        document.body.removeChild(form);
      }, 1000);
    }

    function resetUI() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    function setLoading(message) {
      document.getElementById("loading").innerText = message;
    }

    window.onload = function() {
      if (typeof liff === "undefined") {
        setLoading("LIFF SDK 載入失敗");
        return;
      }

      initLiff();
    };
  </script>
</body>
</html>
